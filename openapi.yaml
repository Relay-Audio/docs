openapi: 3.1.0
info:
  title: Relay API
  description: Voice AI Artifact Detection Platform
  version: 0.1.0
paths:
  /api/v1/auth/api-keys:
    get:
      tags:
      - auth
      summary: List Api Keys
      description: List all API keys for the tenant.
      operationId: list_api_keys_api_v1_auth_api_keys_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/ApiKeyResponse'
                type: array
                title: Response List Api Keys Api V1 Auth Api Keys Get
      security:
      - APIKeyHeader: []
    post:
      tags:
      - auth
      summary: Create Api Key
      description: Create a new API key for the tenant.
      operationId: create_api_key_api_v1_auth_api_keys_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiKeyCreate'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - APIKeyHeader: []
  /api/v1/auth/api-keys/{key_id}:
    delete:
      tags:
      - auth
      summary: Revoke Api Key
      description: Revoke an API key.
      operationId: revoke_api_key_api_v1_auth_api_keys__key_id__delete
      security:
      - APIKeyHeader: []
      parameters:
      - name: key_id
        in: path
        required: true
        schema:
          type: string
          title: Key Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/datasets:
    get:
      tags:
      - datasets
      summary: List Datasets
      description: List all datasets for the current tenant.
      operationId: list_datasets_api_v1_datasets_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/DatasetWithStats'
                type: array
                title: Response List Datasets Api V1 Datasets Get
      security:
      - APIKeyHeader: []
    post:
      tags:
      - datasets
      summary: Create Dataset
      description: Create a new dataset.
      operationId: create_dataset_api_v1_datasets_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DatasetCreate'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - APIKeyHeader: []
  /api/v1/datasets/{dataset_id}:
    get:
      tags:
      - datasets
      summary: Get Dataset
      description: Get a specific dataset by ID.
      operationId: get_dataset_api_v1_datasets__dataset_id__get
      security:
      - APIKeyHeader: []
      parameters:
      - name: dataset_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Dataset Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetWithStats'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - datasets
      summary: Update Dataset
      description: Update a dataset.
      operationId: update_dataset_api_v1_datasets__dataset_id__patch
      security:
      - APIKeyHeader: []
      parameters:
      - name: dataset_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Dataset Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DatasetUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - datasets
      summary: Delete Dataset
      description: Delete a dataset and all associated data.
      operationId: delete_dataset_api_v1_datasets__dataset_id__delete
      security:
      - APIKeyHeader: []
      parameters:
      - name: dataset_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Dataset Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/datasets/{dataset_id}/audio/upload-url:
    post:
      tags:
      - audio
      summary: Get Upload Url
      description: 'Generate a presigned URL for direct S3 upload.


        This endpoint:

        1. Validates the dataset exists and belongs to the tenant

        2. Creates a pending AudioFile record in the database

        3. Generates a presigned POST URL for direct browser upload to S3


        The client should:

        1. Use the returned URL and fields to construct a multipart/form-data POST

        2. Upload the file directly to S3

        3. Call the confirm endpoint to mark the upload as complete'
      operationId: get_upload_url_api_v1_datasets__dataset_id__audio_upload_url_post
      security:
      - APIKeyHeader: []
      parameters:
      - name: dataset_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Dataset Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/datasets/{dataset_id}/audio/confirm:
    post:
      tags:
      - audio
      summary: Confirm Upload
      description: 'Confirm that an audio file upload has completed.


        This endpoint:

        1. Verifies the file exists in S3

        2. Updates the audio file status

        3. Queues the file for processing (normalization + embedding)


        The client should call this after successfully uploading to S3.'
      operationId: confirm_upload_api_v1_datasets__dataset_id__audio_confirm_post
      security:
      - APIKeyHeader: []
      parameters:
      - name: dataset_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Dataset Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmUploadRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfirmUploadResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/datasets/{dataset_id}/audio:
    get:
      tags:
      - audio
      summary: List Audio Files
      description: 'List all audio files in a dataset with pagination.


        Supports filtering by processing status:

        - pending: Awaiting upload confirmation

        - normalizing: Being processed (normalized audio)

        - embedding: Generating embeddings

        - ready: Fully processed and ready for use

        - failed: Processing failed'
      operationId: list_audio_files_api_v1_datasets__dataset_id__audio_get
      security:
      - APIKeyHeader: []
      parameters:
      - name: dataset_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Dataset Id
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          description: Page number
          default: 1
          title: Page
        description: Page number
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          description: Items per page
          default: 50
          title: Page Size
        description: Items per page
      - name: status
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by processing status
          title: Status
        description: Filter by processing status
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AudioListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/datasets/{dataset_id}/audio/{audio_id}:
    get:
      tags:
      - audio
      summary: Get Audio File
      description: Get details of a specific audio file.
      operationId: get_audio_file_api_v1_datasets__dataset_id__audio__audio_id__get
      security:
      - APIKeyHeader: []
      parameters:
      - name: dataset_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Dataset Id
      - name: audio_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Audio Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AudioFileResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - audio
      summary: Delete Audio File
      description: 'Delete an audio file and its associated data.


        This will:

        1. Delete the audio file record from the database

        2. Delete the original file from S3

        3. Delete any normalized/embedding files from S3'
      operationId: delete_audio_file_api_v1_datasets__dataset_id__audio__audio_id__delete
      security:
      - APIKeyHeader: []
      parameters:
      - name: dataset_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Dataset Id
      - name: audio_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Audio Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/datasets/{dataset_id}/audio/{audio_id}/download-url:
    get:
      tags:
      - audio
      summary: Get Download Url
      description: 'Generate a presigned download URL for an audio file.


        By default returns a URL for the original uploaded file.

        Set normalized=true to get the normalized version (if processing is complete).'
      operationId: get_download_url_api_v1_datasets__dataset_id__audio__audio_id__download_url_get
      security:
      - APIKeyHeader: []
      parameters:
      - name: dataset_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Dataset Id
      - name: audio_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Audio Id
      - name: normalized
        in: query
        required: false
        schema:
          type: boolean
          description: Download normalized version if available
          default: false
          title: Normalized
        description: Download normalized version if available
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadUrlResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/datasets/{dataset_id}/annotation-sets:
    post:
      tags:
      - annotations
      summary: Create Annotation Set
      description: 'Create a new annotation set (draft).


        Each annotation set has an auto-incremented version number.

        New sets start as drafts and must be published before training.'
      operationId: create_annotation_set_api_v1_datasets__dataset_id__annotation_sets_post
      security:
      - APIKeyHeader: []
      parameters:
      - name: dataset_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Dataset Id
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnnotationSetResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - annotations
      summary: List Annotation Sets
      description: List all annotation sets for a dataset.
      operationId: list_annotation_sets_api_v1_datasets__dataset_id__annotation_sets_get
      security:
      - APIKeyHeader: []
      parameters:
      - name: dataset_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Dataset Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnnotationSetListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/datasets/{dataset_id}/annotation-sets/{annotation_set_id}:
    get:
      tags:
      - annotations
      summary: Get Annotation Set Detail
      description: Get annotation set with all annotations.
      operationId: get_annotation_set_detail_api_v1_datasets__dataset_id__annotation_sets__annotation_set_id__get
      security:
      - APIKeyHeader: []
      parameters:
      - name: dataset_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Dataset Id
      - name: annotation_set_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Annotation Set Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnnotationSetWithAnnotations'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - annotations
      summary: Delete Annotation Set
      description: 'Delete an annotation set.


        Only draft annotation sets can be deleted.'
      operationId: delete_annotation_set_api_v1_datasets__dataset_id__annotation_sets__annotation_set_id__delete
      security:
      - APIKeyHeader: []
      parameters:
      - name: dataset_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Dataset Id
      - name: annotation_set_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Annotation Set Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/datasets/{dataset_id}/annotation-sets/{annotation_set_id}/publish:
    post:
      tags:
      - annotations
      summary: Publish Annotation Set
      description: 'Publish an annotation set.


        Once published, the annotation set becomes immutable.

        Stats are computed and stored for quick access.'
      operationId: publish_annotation_set_api_v1_datasets__dataset_id__annotation_sets__annotation_set_id__publish_post
      security:
      - APIKeyHeader: []
      parameters:
      - name: dataset_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Dataset Id
      - name: annotation_set_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Annotation Set Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnnotationSetResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/datasets/{dataset_id}/annotation-sets/{annotation_set_id}/annotations:
    post:
      tags:
      - annotations
      summary: Create Annotation
      description: Create a single annotation.
      operationId: create_annotation_api_v1_datasets__dataset_id__annotation_sets__annotation_set_id__annotations_post
      security:
      - APIKeyHeader: []
      parameters:
      - name: dataset_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Dataset Id
      - name: annotation_set_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Annotation Set Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnnotationCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnnotationResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - annotations
      summary: List Annotations
      description: List annotations with optional filters.
      operationId: list_annotations_api_v1_datasets__dataset_id__annotation_sets__annotation_set_id__annotations_get
      security:
      - APIKeyHeader: []
      parameters:
      - name: dataset_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Dataset Id
      - name: annotation_set_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Annotation Set Id
      - name: audio_file_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Audio File Id
      - name: artifact_type
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Artifact Type
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AnnotationResponse'
                title: Response List Annotations Api V1 Datasets  Dataset Id  Annotation Sets  Annotation Set Id  Annotations
                  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/datasets/{dataset_id}/annotation-sets/{annotation_set_id}/annotations/bulk:
    post:
      tags:
      - annotations
      summary: Create Annotations Bulk
      description: Create multiple annotations at once.
      operationId: create_annotations_bulk_api_v1_datasets__dataset_id__annotation_sets__annotation_set_id__annotations_bulk_post
      security:
      - APIKeyHeader: []
      parameters:
      - name: dataset_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Dataset Id
      - name: annotation_set_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Annotation Set Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnnotationBulkCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnnotationBulkResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/datasets/{dataset_id}/annotation-sets/{annotation_set_id}/annotations/{annotation_id}:
    patch:
      tags:
      - annotations
      summary: Update Annotation
      description: Update an annotation.
      operationId: update_annotation_api_v1_datasets__dataset_id__annotation_sets__annotation_set_id__annotations__annotation_id__patch
      security:
      - APIKeyHeader: []
      parameters:
      - name: dataset_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Dataset Id
      - name: annotation_set_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Annotation Set Id
      - name: annotation_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Annotation Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnnotationUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnnotationResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - annotations
      summary: Delete Annotation
      description: Delete an annotation.
      operationId: delete_annotation_api_v1_datasets__dataset_id__annotation_sets__annotation_set_id__annotations__annotation_id__delete
      security:
      - APIKeyHeader: []
      parameters:
      - name: dataset_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Dataset Id
      - name: annotation_set_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Annotation Set Id
      - name: annotation_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Annotation Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/datasets/{dataset_id}/annotation-sets/{annotation_set_id}/export/label-studio:
    get:
      tags:
      - annotations
      summary: Export Label Studio
      description: 'Export annotations in Label Studio format.


        This format can be imported into Label Studio for editing

        or used with Label Studio ML backend.'
      operationId: export_label_studio_api_v1_datasets__dataset_id__annotation_sets__annotation_set_id__export_label_studio_get
      security:
      - APIKeyHeader: []
      parameters:
      - name: dataset_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Dataset Id
      - name: annotation_set_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Annotation Set Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LabelStudioExport'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/training-jobs:
    post:
      tags:
      - training
      summary: Create Training Job
      description: 'Create a new training job.


        Requirements:

        - Dataset must belong to tenant

        - Annotation set must be published

        - All audio files must have embeddings computed

        - At least 5 minutes of total audio'
      operationId: create_training_job_api_v1_training_jobs_post
      security:
      - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrainingJobCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainingJobResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - training
      summary: List Training Jobs
      description: List training jobs for the tenant.
      operationId: list_training_jobs_api_v1_training_jobs_get
      security:
      - APIKeyHeader: []
      parameters:
      - name: dataset_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Dataset Id
      - name: status
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Status
      - name: page
        in: query
        required: false
        schema:
          type: integer
